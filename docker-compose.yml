version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: paranaue-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meu_banco
    ports:
      - "54315:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paranaue-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/meu_banco
    env_file:
      - ./backend/.env.local
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
        alembic upgrade head &&
        python -c \"import asyncio; from app.core.bootstrap import init_initial_data; asyncio.run(init_initial_data())\" &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paranaue-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
